apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-traefik
  namespace: flux-system
spec:
  interval: 5m
  path: ./polaris
  prune: true
  sourceRef:
    kind: GitRepository
    name: traefik
  dependsOn:
    - name: infra-cilium
    - name: infra-letsencrypt-issuer
    - name: infra-external-secrets
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars