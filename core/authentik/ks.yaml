apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-authentik
  namespace: flux-system
spec:
  interval: 5m
  path: ./polaris
  prune: true
  sourceRef:
    kind: GitRepository
    name: authentik
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars