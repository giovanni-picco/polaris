apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./config
  prune: true
  dependsOn:
    - name: flux-system 
  decryption:
    provider: sops
    secretRef:
      name: sops-age