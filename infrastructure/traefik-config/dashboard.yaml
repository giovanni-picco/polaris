---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-traefik-certificate
  namespace: traefik
spec:
  secretName: dashboard-traefik-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: traefik.${CLUSTER_DOMAIN}
  dnsNames:
    - traefik.${CLUSTER_DOMAIN}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-traefik-ingress
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: dashboard-traefik-tls