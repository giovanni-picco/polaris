apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-plugin
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: "0.34.1"
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
      interval: 24h
  values:
    enabled: true
    sharedDevNum: 10
    nodeFeatureDiscovery:
      enabled: false