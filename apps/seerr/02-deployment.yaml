apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      shareProcessNamespace: true
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /app/config && chmod -R 775 /app/config"]
          volumeMounts:
            - name: config
              mountPath: /app/config
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:develop
          ports:
            - containerPort: 5055
          env:
            - name: LOG_LEVEL
              value: debug
            - name: TZ
              value: Europe/Rome
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - wget
                - --no-verbose
                - --tries=1
                - --spider
                - http://localhost:5055/api/v1/status
            initialDelaySeconds: 20
            timeoutSeconds: 3
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - wget
                - --no-verbose
                - --tries=1
                - --spider
                - http://localhost:5055/api/v1/status
            initialDelaySeconds: 20
            timeoutSeconds: 3
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config