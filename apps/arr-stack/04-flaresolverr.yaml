---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: arr-stack
  labels:
    app: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        # ---- SIDECAR: gluetun ----
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "nordvpn"
            - name: VPN_TYPE
              value: "openvpn"
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: OPENVPN_PASSWORD
            - name: TZ
              value: "Europe/Rome"
            - name: UPDATER_PERIOD
              value: "4h"
            - name: SERVER_COUNTRIES
              value: "Italy,Germany,France,Netherlands,Switzerland,Spain"
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
          ports:
            - containerPort: 8000
              name: gluetun-ctrl
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun
            - name: dev-tun
              mountPath: /dev/net/tun
          readinessProbe:
            httpGet:
              path: /v1/vpn/status
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/vpn/status
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

        # ---- MAIN: flaresolverr ----
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          env:
            - name: TZ
              value: "Europe/Rome"
          ports:
            - containerPort: 8191
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: gluetun-config
          persistentVolumeClaim:
            claimName: pvc-config-gluetun
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: arr-stack
spec:
  selector:
    app: flaresolverr
  ports:
    - name: http
      port: 8191
      targetPort: 8191
  type: ClusterIP