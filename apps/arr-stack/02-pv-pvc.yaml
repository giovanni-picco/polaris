---
# ============================================================
# PersistentVolume: root (NFS /volume1/media/)
# ============================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-media-root
spec:
  capacity:
    storage: 4Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nolock
    - soft
    - rw
  nfs:
    server: ${NAS_DOMAIN}
    path: /volume1/media/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-media-root
  namespace: arr-stack
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeName: pv-media-root
  storageClassName: ""
---
