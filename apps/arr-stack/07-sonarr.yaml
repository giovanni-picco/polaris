---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr-stack
  labels:
    app: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: ghcr.io/hotio/sonarr:release-4.0.16.2944
          env:
            - name: TZ
              value: "Europe/Rome"
          ports:
            - containerPort: 8989
              name: http
          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: media-root
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: pvc-config-sonarr
        - name: media-root
          persistentVolumeClaim:
            claimName: pvc-media-root

---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: arr-stack
spec:
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: 8989
  type: ClusterIP

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sonarr-cert
  namespace: arr-stack
spec:
  secretName: sonarr-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - sonarr.${CLUSTER_DOMAIN}

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: arr-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authentik
      services:
        - name: sonarr
          port: 8989
  tls:
    secretName: sonarr-tls