---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: arr-stack
  labels:
    app: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: ghcr.io/hotio/radarr:release-6.0.4.10291
          env:
            - name: TZ
              value: "Europe/Rome"
          ports:
            - containerPort: 7878
              name: http
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: media-root
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"

      volumes:
        - name: radarr-config
          persistentVolumeClaim:
            claimName: pvc-config-radarr
        - name: media-root
          persistentVolumeClaim:
            claimName: pvc-media-root

---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: arr-stack
spec:
  selector:
    app: radarr
  ports:
    - name: http
      port: 7878
      targetPort: 7878
  type: ClusterIP

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: radarr-cert
  namespace: arr-stack
spec:
  secretName: radarr-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - radarr.${CLUSTER_DOMAIN}

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: arr-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authentik
      services:
        - name: radarr
          port: 7878
  tls:
    secretName: radarr-tls