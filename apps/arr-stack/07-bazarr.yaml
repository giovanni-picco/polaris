---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: arr-stack
  labels:
    app: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
        # ---- SIDECAR: gluetun ----
        - name: gluetun
          image: qmcgaw/gluetun:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "nordvpn"
            - name: VPN_TYPE
              value: "openvpn"
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: OPENVPN_PASSWORD
            - name: TZ
              value: "Europe/Rome"
            - name: UPDATER_PERIOD
              value: "4h"
            - name: SERVER_COUNTRIES
              value: "Italy,Germany,France,Netherlands,Switzerland,Spain"
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun
            - name: dev-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

        # ---- MAIN: bazarr ----
        - name: bazarr
          image: ghcr.io/hotio/bazarr:release-v1.5.5
          env:
            - name: TZ
              value: "Europe/Rome"
            - name: UMASK
              value: "002"
          ports:
            - containerPort: 6767
              name: http
          volumeMounts:
            - name: bazarr-config
              mountPath: /config
            - name: media-media
              mountPath: /data/media
          resources:
            requests:
              memory: "128Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "200m"

      volumes:
        - name: gluetun-config
          persistentVolumeClaim:
            claimName: pvc-config-gluetun
        - name: bazarr-config
          persistentVolumeClaim:
            claimName: pvc-config-bazarr
        - name: media-media
          persistentVolumeClaim:
            claimName: pvc-media-media
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice

---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: arr-stack
spec:
  selector:
    app: bazarr
  ports:
    - name: http
      port: 6767
      targetPort: 6767
  type: ClusterIP

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bazarr-cert
  namespace: arr-stack
spec:
  secretName: bazarr-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - bazarr.${CLUSTER_DOMAIN}

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: arr-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bazarr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: bazarr
          port: 6767
  tls:
    secretName: bazarr-tls