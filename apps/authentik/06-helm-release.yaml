apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 30m
  chart:
    spec:
      chart: authentik
      version: "2025.12.4"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 30m
  values:
    authentik:
      error_reporting:
        enabled: true
      email:
        host: "smtp-relay.brevo.com"
        port: 587
        timeout: 30
        from: "no_reply@polarislab.dev"
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: secret-key-cred
              key: secret_key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-cred
              key: password
        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: authentik-smtp-credentials
              key: username
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-smtp-credentials
              key: password
    server:
      name: server
      ingress:
        ingressClassName: traefik
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - sso.${CLUSTER_DOMAIN}
        tls:
          - hosts:
              - sso.${CLUSTER_DOMAIN}
            secretName: authentik-tls
        https: false
      metrics:
        enabled: true
    worker:
      name: worker
      metrics:
        enabled: true
    postgresql:
      enabled: true
      image:
        tag: latest
      fullnameOverride: postgresql
      auth:
        username: authentik
        database: authentik
        existingSecret: database-cred
        secretKeys:
          adminPasswordKey: postgres-password
          userPasswordKey: password
      primary:
        name: master
        persistence:
          enabled: true
          storageClass: longhorn
          size: 20Gi
        persistentVolumeClaimRetentionPolicy:
          enabled: true
          whenScaled: Retain
          whenDeleted: Retain
        resources:
          limits:
            cpu: 750m
            memory: 2Gi
      readReplicas:
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
      metrics:
        enabled: true
        image:
          tag: latest
        resources:
          limits:
            cpu: 100m
            memory: 128Mi