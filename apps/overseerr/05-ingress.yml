apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: overseerr
  namespace: overseerr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`seerr.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: overseerr
          port: 5055
          scheme: http
  tls:
    secretName: overseerr-tls